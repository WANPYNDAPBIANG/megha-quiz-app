<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Contact | Megha Quiz App</title>

  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar-footer.css">
  <link rel="stylesheet" href="css/contact.css">
</head>
<body>

<nav id="navbar"></nav>

<main>

  <!-- HERO -->

  <section class="contact-hero">

    <div class="container">

      <h1>Contact & Support</h1>

      <p>
        Have questions, feedback, or issues? We’re here to help you.
      </p>

    </div>

  </section>

  <!-- CONTACT LAYOUT -->

  <section class="contact-section">

    <div class="container contact-grid">

      <!-- FORM -->

      <div class="contact-card">

        <h2>Send a Message</h2>

        <form id="contactForm">

          <div class="form-group">
            <label>Name</label>
            <input type="text" placeholder="Your full name">
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="you@example.com">
          </div>

          <div class="form-group">
            <label>Subject</label>
            <input type="text" placeholder="What is this about?">
          </div>

          <div class="form-group">
            <label>Message</label>
            <textarea placeholder="Write your message..."></textarea>
          </div>

          <button class="btn btn-primary" type="submit">
            Send Message
          </button>

        </form>

      </div>

      <!-- INFO PANEL -->

      <div class="contact-info">

        <div class="info-card">

          <h3>Email</h3>
          <p>support@meghaquiz.com</p>

        </div>

        <div class="info-card">

          <h3>Phone</h3>
          <p>+91 00000 00000</p>

        </div>

        <div class="info-card">

          <h3>Response Time</h3>
          <p>Within 24–48 hours</p>

        </div>

        <div class="info-card highlight">

          <h3>Important Note</h3>
          <p>
            For exam-related queries, include subject and exam name for faster support.
          </p>

        </div>

      </div>

    </div>

  </section>

</main>

<footer id="footer"></footer>

<script src="js/navbar.js"></script>
<script src="js/footer.js"></script>
<script src="js/contact.js"></script>

</body>
</html>
